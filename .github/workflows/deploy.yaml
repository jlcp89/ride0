name: Deploy to AWS EC2

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches:
      - dev
      - main

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run ruff
        run: ruff check .
      - name: Run tests
        run: pytest -v

  deploy_dev:
    name: Deploy DEV Environment
    needs: test
    if: github.event.pull_request.base.ref == 'dev'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Deploy to EC2 (dev)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_DEV }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user
            echo "Removing any previous wingz-ride0 folder..."
            rm -rf wingz-ride0
            echo "Cloning repository (PR branch: ${{ github.event.pull_request.head.ref }})..."
            git clone --depth 1 --branch ${{ github.event.pull_request.head.ref }} --single-branch \
              https://${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git wingz-ride0
            cd wingz-ride0/backend
            echo "Installing Python dependencies..."
            python3 -m venv .venv
            source .venv/bin/activate
            pip install -r requirements.txt
            echo "Running migrations..."
            python manage.py migrate
            echo "Stopping service before replacing app..."
            sudo systemctl stop wingz-api || true
            echo "Copying app to production folder..."
            sudo mkdir -p /home/ec2-user/production/wingz
            sudo cp -r . /home/ec2-user/production/wingz/
            echo "Setting proper ownership..."
            sudo chown -R ec2-user:ec2-user /home/ec2-user/production
            echo "Configuring environment variables..."
            sudo mkdir -p /etc/systemd/system/wingz-api.service.d
            sudo tee /etc/systemd/system/wingz-api.service.d/env.conf > /dev/null <<EOF
            [Service]
            Environment="DJANGO_DEBUG=False"
            Environment="DJANGO_ALLOWED_HOSTS=${{ secrets.EC2_HOST_DEV }}"
            Environment="DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}"
            Environment="DB_NAME=${{ secrets.DB_NAME }}"
            Environment="DB_USER=${{ secrets.DB_USER }}"
            Environment="DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
            Environment="DB_HOST=${{ secrets.DB_HOST }}"
            Environment="DB_PORT=3306"
            EOF
            sudo chmod 600 /etc/systemd/system/wingz-api.service.d/env.conf
            echo "Reloading systemd and starting service..."
            sudo systemctl daemon-reload
            sudo systemctl start wingz-api
            sleep 2
            curl -sf http://localhost:8000/api/rides/ -o /dev/null -w "%{http_code}" || echo "WARNING: Health check failed"
            echo "DEV deployment finished."

  deploy_prod:
    name: Deploy PROD Environment
    needs: test
    if: |
      github.event_name == 'push' ||
      (github.event.pull_request.base.ref == 'main' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Deploy to EC2 (prod)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user
            echo "Removing any previous wingz-ride0 folder..."
            rm -rf wingz-ride0
            echo "Cloning repository (main branch)..."
            git clone --depth 1 --branch main --single-branch \
              https://${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git wingz-ride0
            cd wingz-ride0/backend
            echo "Installing Python dependencies..."
            python3 -m venv .venv
            source .venv/bin/activate
            pip install -r requirements.txt
            echo "Running migrations..."
            python manage.py migrate
            echo "Stopping service before replacing app..."
            sudo systemctl stop wingz-api || true
            echo "Copying app to production folder..."
            sudo mkdir -p /home/ec2-user/production/wingz
            sudo cp -r . /home/ec2-user/production/wingz/
            echo "Setting proper ownership..."
            sudo chown -R ec2-user:ec2-user /home/ec2-user/production
            echo "Configuring environment variables..."
            sudo mkdir -p /etc/systemd/system/wingz-api.service.d
            sudo tee /etc/systemd/system/wingz-api.service.d/env.conf > /dev/null <<EOF
            [Service]
            Environment="DJANGO_DEBUG=False"
            Environment="DJANGO_ALLOWED_HOSTS=${{ secrets.EC2_HOST_PROD }}"
            Environment="DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}"
            Environment="DB_NAME=${{ secrets.DB_NAME }}"
            Environment="DB_USER=${{ secrets.DB_USER }}"
            Environment="DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
            Environment="DB_HOST=${{ secrets.DB_HOST }}"
            Environment="DB_PORT=3306"
            EOF
            sudo chmod 600 /etc/systemd/system/wingz-api.service.d/env.conf
            echo "Reloading systemd and starting service..."
            sudo systemctl daemon-reload
            sudo systemctl start wingz-api
            sleep 2
            curl -sf http://localhost:8000/api/rides/ -o /dev/null -w "%{http_code}" || echo "WARNING: Health check failed"
            echo "PROD deployment finished."
